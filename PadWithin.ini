; ============================================================================
;  PadWithin.ini  -  Prince of Persia: Warrior Within gamepad proxy
;  Place next to dinput8.dll (in the game folder). Delete to use defaults.
;  Every setting below is active out of the box, at its default value — just
;  edit the number after "=" for anything you want to change. Lines starting
;  with ";" are comments/explanations only and can be left alone.
; ============================================================================

[General]
; Write a debug log (PadWithin.log) next to the game exe. Off by default.
; Turn on (1) only when troubleshooting.
EnableLog=0
; DIAGNOSTIC: pass native controller through untouched and dump raw state.
; Set 0 for normal operation.
Passthrough=0
; Which controller to use if several are connected. -1 = auto (pick the pad
; actually sending input). Or set the SDL device index (0, 1, ...).
ControllerIndex=-1

[Sensitivity]
; --- Movement (left stick) ---
; No speed multiplier for movement — just deadzone/calibration.
; Radial deadzone, 0.0 .. 1.0 (fraction of full stick travel before it
; registers at all). Raise if the Prince drifts/creeps with the stick centered.
MoveDeadzone=0.25
; Outer calibration: if your stick is worn/loose and never QUITE reaches full
; physical deflection, the Prince may refuse to run at "full" push. Lower this
; (e.g. 90) so that 90% deflection already counts as 100%. 100 = off/default.
MoveMaxStickRange=100

; --- Camera (right stick) ---
; Note: the in-game "Gamepad Sensitivity" slider (Controls menu) doesn't
; reliably affect anything with this proxy — use this setting instead.
; Sensitivity as a percentage. 50 is the formula's baseline (1.0x speed) —
; the shipped default here is 65, a bit faster than baseline. Turn it up for
; an even faster camera, down for slower. No upper limit — go as high as
; feels good.
CameraSensitivity=65
; Radial deadzone, same idea as MoveDeadzone but for the camera stick.
CameraDeadzone=0.15
; Outer calibration, same idea as MoveMaxStickRange but for the camera stick.
CameraMaxStickRange=100

; Reserved (only used if triggers ever act as buttons).
TriggerThreshold=0.20
; Cross-axis suppression: while pushing mostly-vertical or mostly-horizontal,
; snap the minor axis to exactly zero so WW's axis-BINDING screen can tell
; them apart (real hardware always leaks a hair of the "other" axis, which
; the binding detector latches onto first). 0 disables. True diagonal input
; (both axes comparable) is unaffected. Lower = more aggressive snapping.
; Matches the deadzone value by default (0.25).
AxisSnapRatio=0.25

[Axes]
; Set to 1 to invert. Handy if forward/back or camera feel reversed.
InvertMoveY=0
InvertCameraY=0
InvertCameraX=0
; Swap which trigger drives Z+/Z- (Camera Look vs Alternate View).
;   0: RT -> Z(+), LT -> Z(-)      1: swapped
SwapTriggers=0
; If the camera stick behaves wrong, try routing it to Z/Rz instead of Rx/Ry.
;   0: camera on Rx/Ry, triggers on Z   1: camera on Z/Rz, triggers on Rx
CameraOnZRz=0

[Spoof]
; Present a CONSISTENT controller identity to the game regardless of which
; real pad is plugged in. This is NOT what fixes axis mis-detection (that's
; AxisSnapRatio above) — it solves a different annoyance: WW saves bindings
; in Profile.DAT keyed to VID/PID, so switching real controllers normally
; resets your bindings every time. A consistent spoofed identity means you
; only need to bind once, and it sticks across any pad you plug in.
; Off by default (0) — enable if you swap controllers often.
SpoofVidPid=0
VID=0x045e
PID=0x0007

[Buttons]
; Value = WW "Btn N" minus 1  (Btn1 -> 0, Btn12 -> 11).  -1 = unmapped.
; Defaults follow the PS layout captured from the in-game menu:
A=0      ; Btn1  Roll / Jump / Eject / Accept
B=1      ; Btn2  Pickup / Throw / Climb down / Cancel
X=2      ; Btn3  Sword Attack
Y=3      ; Btn4  Grab / 2nd weapon attack
LB=4     ; Btn5  Rewind / Slowdown
RB=5     ; Btn6  Walling / Block
Start=7  ; Btn8  Start
Back=11  ; Btn12 Navigation Map
LS=8     ; Btn9  (unbound by default; assign in-game if desired)
RS=9     ; Btn10 Reset Camera
